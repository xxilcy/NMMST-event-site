<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海科館活動報名系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-gray-900">

    <nav class="bg-white p-4 flex justify-between items-center shadow-sm">
        <div class="font-bold text-xl text-blue-900">📅 海科館活動報名</div>
    </nav>

    <div class="bg-blue-600 text-white py-16 text-center">
        <h1 class="text-4xl font-bold mb-4">活動報名進行中</h1>
    </div>

    <div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg border">
        <h2 class="text-2xl font-bold mb-4">[海科館] 2026年世界海洋日x原住民文化推廣</h2>
        <div class="text-gray-600 mb-4 space-y-1">
            <p>📅 2026年4月2日 週四</p>
            <p>📍 海科館主題館廣場</p>
        </div>
        <button id="applyBtn" class="w-full bg-amber-900 text-white py-3 rounded-lg font-bold hover:bg-amber-800 transition">登入後報名</button>
    </div>

    <div id="formContainer" class="hidden max-w-4xl mx-auto mt-6 p-6 bg-white rounded-xl shadow-lg border border-blue-100">
        <h2 class="text-xl font-bold mb-4 text-blue-900">請填寫報名資訊</h2>
        <form id="applyForm" class="space-y-4">
            <input type="text" id="name" placeholder="姓名" class="w-full p-3 border rounded" required>
            <input type="text" id="id_card" placeholder="身分證字號" class="w-full p-3 border rounded" required>
            <select id="type" class="w-full p-3 border rounded bg-white">
                <option value="攤主">攤主</option>
                <option value="表演者">表演者</option>
            </select>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg">送出報名</button>
        </form>
    </div>

    <script>
        // 記得填入你的 Supabase 金鑰
        const SUPABASE_URL = 'https://sqgleqbuhnixhmdfdmqy.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_fYTFzKqHCCCDPgr3YB5YMQ_WBxvu7H6'; 

        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // 修復後的互動：點擊按鈕顯示表單
        document.getElementById('applyBtn').addEventListener('click', () => {
            document.getElementById('formContainer').classList.remove('hidden');
        });

        // 送出資料邏輯
        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "報名中...";
            
            try {
                const { error } = await _supabase
                    .from('applications')
                    .insert([{ 
                        applicant_name: document.getElementById('name').value,
                        applicant_id_card: document.getElementById('id_card').value,
                        applicant_type: document.getElementById('type').value
                    }]);
                if (error) throw error;
                alert('報名成功！');
                document.getElementById('applyForm').reset();
            } catch (err) {
                alert('報名失敗: ' + err.message);
            } finally {
                btn.innerText = "送出報名";
            }
        });
    </script>
</body>
</html>
