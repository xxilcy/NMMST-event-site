<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>海科館活動報名系統</title>
</head>
<body class="bg-slate-50 text-gray-900">

    <nav class="bg-white p-4 flex justify-between items-center shadow-sm">
        <div class="font-bold text-xl text-blue-900">📅 活動報名系統</div>
        <div class="space-x-4">
            <a href="#" class="text-gray-600">登入</a>
            <a href="#" class="bg-stone-800 text-white px-4 py-2 rounded-md">立即註冊</a>
        </div>
    </nav>

    <div class="bg-blue-500 text-white py-16 text-center">
        <h1 class="text-4xl font-bold mb-4">歡迎參加我們的活動</h1>
        <p class="mb-8">探索精彩活動，立即報名參加</p>
        <div class="space-x-4">
            <button class="bg-white text-blue-600 px-6 py-2 rounded-lg font-bold">瀏覽活動</button>
            <button class="border border-white px-6 py-2 rounded-lg">立即註冊</button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg border">
        <h2 class="text-2xl font-bold mb-4">[海科館] 2026年世界海洋日x原住民文化推廣</h2>
        <div class="text-gray-600 mb-4">
            <p>📅 2026年4月2日 週四</p>
            <p>📍 海科館主題館廣場</p>
            <p>👥 0 人已報名</p>
        </div>
        <p class="mb-6">歡迎參加本次世界海洋日x原住民文化推廣活動，我們將於6月6日-6月7日於海科館主題館廣場舉辦...</p>
        <button id="applyBtn" class="w-full bg-amber-900 text-white py-3 rounded-lg font-bold">登入後報名</button>
    </div>

    <div id="formContainer" class="hidden max-w-4xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg border">
        <h2 class="text-xl font-bold mb-4">填寫報名資訊</h2>
        <form id="applyForm" class="space-y-4">
            <input type="text" id="name" placeholder="姓名" class="w-full p-3 border rounded" required>
            <input type="text" id="id_card" placeholder="身分證字號" class="w-full p-3 border rounded" required>
            <select id="type" class="w-full p-3 border rounded">
                <option value="攤主">攤主</option>
                <option value="表演者">表演者</option>
            </select>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg">送出報名</button>
        </form>
    </div>

    <script>
        // 互動邏輯：點擊按鈕顯示表單
        document.getElementById('applyBtn').addEventListener('click', () => {
            document.getElementById('formContainer').classList.remove('hidden');
        });
    </script>
</body>
</html>
