<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海科館活動報名</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --nmmst-blue: #004A7C; --bg-blue: #F0F7FA; }
        body { font-family: sans-serif; background-color: var(--bg-blue); padding: 20px; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--nmmst-blue); }
        h1 { color: var(--nmmst-blue); text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--nmmst-blue); color: white; padding: 15px; border: none; border-radius: 6px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>活動報名系統</h1>
        <form id="applyForm">
            <input type="text" id="name" placeholder="姓名" required>
            <input type="text" id="id_card" placeholder="身分證字號" required>
            <select id="type">
                <option value="攤主">攤主</option>
                <option value="表演者">表演者</option>
            </select>
            <button type="submit">送出報名</button>
        </form>
    </div>

    <script>
        // 1. 這裡請務必替換成你的實際資料！
        const supabaseUrl = 'https://sqgleqbuhnixhmdfdmqy.supabase.co'; 
        const supabaseKey = 'sb_publishable_fYTFzKqHCCCDPgr3YB5YMQ_WBxvu7H6'; 
        
        // 2. 初始化 Supabase (修正過的載入語法)
        const { createClient } = supabase;
        const _supabase = createClient(supabaseUrl, supabaseKey);

        document.getElementById('applyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            console.log("正在送出報名..."); // 這行可以幫我們除錯
            
            const { error } = await _supabase
                .from('applications')
                .insert([
                    { 
                        applicant_name: document.getElementById('name').value,
                        applicant_id_card: document.getElementById('id_card').value,
                        applicant_type: document.getElementById('type').value
                    }
                ]);

            if (error) {
                console.error("Supabase 錯誤:", error); // 這行會顯示錯誤細節
                alert('報名失敗: ' + error.message);
            } else {
                alert('報名成功！');
                document.getElementById('applyForm').reset();
            }
        });
    </script>
</body>
</html>
