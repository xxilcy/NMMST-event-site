<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海科館活動報名系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-stone-50 min-h-screen">
    <nav class="bg-white p-4 flex justify-between items-center shadow-sm border-b">
        <div class="font-bold text-xl text-blue-900">📅 海科館活動報名</div>
        <div id="userState"></div>
    </nav>

    <div class="max-w-md mx-auto mt-10 p-8 bg-white rounded-2xl shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-center">建立會員帳號</h2>
        <form id="signupForm" class="space-y-4">
            <input type="text" id="full_name" placeholder="真實姓名" class="w-full p-3 border rounded" required>
            <input type="text" id="id_card" placeholder="身分證字號" class="w-full p-3 border rounded" required>
            <input type="date" id="birthday" class="w-full p-3 border rounded" required>
            <input type="email" id="email" placeholder="電子信箱" class="w-full p-3 border rounded" required>
            <input type="tel" id="phone" placeholder="手機號碼" class="w-full p-3 border rounded" required>
            <input type="password" id="password" placeholder="密碼 (至少 6 碼)" class="w-full p-3 border rounded" required minlength="6">
            <button type="submit" class="w-full bg-amber-900 text-white py-3 rounded-lg font-bold">完成註冊</button>
        </form>
    </div>

    <script>
        // 【請務必填入你的實際金鑰】
        const SUPABASE_URL = 'https://sqgleqbuhnixhmdfdmqy.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_fYTFzKqHCCCDPgr3YB5YMQ_WBxvu7H6'; 
        
        const supabase = supabasejs.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. 註冊帳號
            const { data, error: authError } = await supabase.auth.signUp({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (authError) return alert("註冊失敗: " + authError.message);

            // 2. 存入額外個人資料至 profiles 表
            const { error: profileError } = await supabase.from('profiles').insert([{
                id: data.user.id,
                name: document.getElementById('full_name').value,
                id_card: document.getElementById('id_card').value,
                birthday: document.getElementById('birthday').value,
                phone: document.getElementById('phone').value
            }]);

            if (profileError) alert("帳號已建立，但個人資料存入失敗: " + profileError.message);
            else alert("註冊成功！");
        });
    </script>
</body>
</html>
